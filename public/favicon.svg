<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0c0f"/>

  <!-- Input layer neurons -->
  <circle cx="25" cy="35" r="8" fill="#22c55e"/>
  <circle cx="25" cy="65" r="8" fill="#22c55e"/>

  <!-- Hidden layer neurons -->
  <circle cx="50" cy="25" r="7" fill="url(#nn-grad)"/>
  <circle cx="50" cy="50" r="7" fill="url(#nn-grad)"/>
  <circle cx="50" cy="75" r="7" fill="url(#nn-grad)"/>

  <!-- Output layer neuron -->
  <circle cx="75" cy="50" r="8" fill="#f97316"/>

  <!-- Connections -->
  <g stroke="#4b5563" stroke-width="1.5" opacity="0.6">
    <!-- Input to hidden -->
    <line x1="33" y1="35" x2="43" y2="25"/>
    <line x1="33" y1="35" x2="43" y2="50"/>
    <line x1="33" y1="35" x2="43" y2="75"/>
    <line x1="33" y1="65" x2="43" y2="25"/>
    <line x1="33" y1="65" x2="43" y2="50"/>
    <line x1="33" y1="65" x2="43" y2="75"/>
    <!-- Hidden to output -->
    <line x1="57" y1="25" x2="67" y2="50"/>
    <line x1="57" y1="50" x2="67" y2="50"/>
    <line x1="57" y1="75" x2="67" y2="50"/>
  </g>
</svg>
